<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasyCourse GN</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
h1 { text-align:center; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.btn-add { background:#007bff; color:white; }
.btn-status { background:#28a745; color:white; }
.btn-whatsapp { background:#25D366; color:white; }
.btn-pdf { background:#ff9800; color:white; }
.btn-delete { background:#dc3545; color:white; }

.order { border-bottom:1px solid #eee; padding:10px 0; }
</style>
</head>

<body>

<div class="container">

<h1>EasyCourse GN</h1>

<div class="card">
<h3>Statistiques</h3>
<p>Total gagné : <b id="totalGain">0</b> GNF</p>
<p>Commandes terminées : <b id="doneCount">0</b></p>
</div>

<div class="card">
<h3>Nouvelle commande</h3>

<input id="client" placeholder="Nom client">
<input id="phone" placeholder="Téléphone (ex: 224...)">

<select id="service">
<option>Course</option>
<option>Paiement</option>
<option>Démarche</option>
<option>Colis</option>
</select>

<input id="amount" type="number" placeholder="Montant (GNF)">

<select id="distance">
<option value="proche">Proche</option>
<option value="moyen">Moyen</option>
<option value="loin">Loin</option>
</select>

<select id="urgent">
<option value="0">Normal</option>
<option value="10000">Urgent (+10 000)</option>
</select>

<button class="btn-add" onclick="addOrder()">Ajouter commande</button>
</div>

<div class="card">
<h3>Commandes</h3>
<div id="orders"></div>
</div>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function calculate(amount, distance, urgent) {
  let base = 15000;
  if(distance === "moyen") base = 20000;
  if(distance === "loin") base = 25000;

  let percent = amount * 0.03;
  let total = base + percent + Number(urgent);

  return { base, percent, total };
}

function addOrder() {
  let client = document.getElementById("client").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let amount = Number(document.getElementById("amount").value);
  let distance = document.getElementById("distance").value;
  let urgent = document.getElementById("urgent").value;

  if(!client || !phone || amount <= 0){
    alert("Remplis correctement les champs !");
    return;
  }

  let calc = calculate(amount, distance, urgent);

  let order = {
    client, phone, service, amount, distance,
    base: calc.base,
    percent: calc.percent,
    total: calc.total,
    status: "En attente"
  };

  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  render();
}

function render() {
  let list = document.getElementById("orders");
  list.innerHTML = "";

  orders.forEach((o, i) => {
    list.innerHTML += `
    <div class="order">
      <b>${o.client}</b> (${o.phone})<br>
      Service: ${o.service}<br>
      Montant: ${o.amount.toLocaleString()} GNF<br>

      Frais: ${o.base.toLocaleString()} GNF<br>
      Commission (3%): ${Math.round(o.percent).toLocaleString()} GNF<br>

      <b>Total: ${Math.round(o.total).toLocaleString()} GNF</b><br>
      Statut: ${o.status}<br>

      <button class="btn-status" onclick="updateStatus(${i})">Statut</button>
      <button class="btn-whatsapp" onclick="sendWhatsApp(${i})">WhatsApp</button>
      <button class="btn-pdf" onclick="generatePDF(${i})">Facture</button>
      <button class="btn-delete" onclick="deleteOrder(${i})">Supprimer</button>
    </div>
    `;
  });

  updateStats();
}

function updateStatus(i){
  let statuses = ["En attente","En cours","Terminé"];
  let next = statuses[(statuses.indexOf(orders[i].status)+1)%3];
  orders[i].status = next;
  localStorage.setItem("orders", JSON.stringify(orders));
  render();
}

function deleteOrder(i){
  if(confirm("Supprimer cette commande ?")){
    orders.splice(i,1);
    localStorage.setItem("orders", JSON.stringify(orders));
    render();
  }
}

function updateStats(){
  let total = 0;
  let done = 0;

  orders.forEach(o=>{
    if(o.status==="Terminé"){
      total += o.total;
      done++;
    }
  });

  document.getElementById("totalGain").innerText = total.toLocaleString();
  document.getElementById("doneCount").innerText = done;
}

function sendWhatsApp(i){
  let o = orders[i];

  let message = `Bonjour ${o.client},

Commande EasyCourse GN :

Service: ${o.service}
Montant: ${o.amount} GNF

Frais: ${o.base} GNF
Commission: ${Math.round(o.percent)} GNF

Total: ${Math.round(o.total)} GNF`;

  window.open("https://wa.me/"+o.phone+"?text="+encodeURIComponent(message));
}

function generatePDF(i){
  let o = orders[i];

  let text = `
EASYCOURSE GN

Client: ${o.client}
Téléphone: ${o.phone}

Service: ${o.service}
Montant: ${o.amount} GNF

Frais: ${o.base} GNF
Commission: ${Math.round(o.percent)} GNF

TOTAL: ${Math.round(o.total)} GNF
`;

  let blob = new Blob([text], {type:"text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "facture.txt";
  a.click();
}

render();

</script>

</body>
</html>
