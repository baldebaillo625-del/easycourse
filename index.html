<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasyCourse GN</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:12px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { padding:8px; border:none; border-radius:5px; margin-top:5px; cursor:pointer;}
.green { background:#28a745; color:white; }
.red { background:#dc3545; color:white; }
.whatsapp { background:#25D366; color:white; }
</style>
</head>

<body>

<div class="container">

<h2>EasyCourse GN</h2>

<div class="card">
Total gagné : <b id="total">0</b> GNF
</div>

<div class="card">
<input id="client" placeholder="Nom">
<input id="phone" placeholder="Téléphone">
<select id="service">
<option>Course</option>
<option>Paiement</option>
<option>Démarche</option>
<option>Colis</option>
</select>
<input id="amount" type="number" placeholder="Montant">
<button onclick="addOrder()">Ajouter</button>
</div>

<div class="card">
<div id="orders"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBo6Iosq4_Pgdi3ZzyhzRnNkW065cAgyhY",
  authDomain: "easycourse-960bc.firebaseapp.com",
  projectId: "easycourse-960bc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function calculate(amount){
  return 15000 + (amount * 0.03);
}

function addOrder(){
  let client = client.value;
  let phone = phone.value;
  let service = service.value;
  let amount = Number(amountInput.value);

  if(!client || !phone || amount<=0){
    alert("Remplis correctement");
    return;
  }

  db.collection("orders").add({
    client, phone, service, amount,
    total: calculate(amount),
    status:"En attente",
    date:new Date()
  });
}

function loadOrders(){
  db.collection("orders").orderBy("date","desc")
  .onSnapshot(snap=>{
    let html="";
    let total=0;

    snap.forEach(doc=>{
      let o = doc.data();
      let id = doc.id;

      if(o.status==="Terminé") total += o.total;

      html+=`
      <div>
      <b>${o.client}</b> (${o.phone})<br>
      ${o.service} - ${o.amount} GNF<br>
      Total: ${Math.round(o.total)}<br>
      Statut: ${o.status}<br>

      <button class="green" onclick="updateStatus('${id}','${o.status}')">Statut</button>
      <button class="red" onclick="deleteOrder('${id}')">Supprimer</button>
      <button class="whatsapp" onclick="sendWhatsApp('${o.phone}','${o.total}')">WhatsApp</button>
      <hr>
      </div>`;
    });

    orders.innerHTML = html;
    document.getElementById("total").innerText = total;
  });
}

function updateStatus(id,status){
  let next = status==="En attente"?"En cours":status==="En cours"?"Terminé":"En attente";
  db.collection("orders").doc(id).update({status:next});
}

function deleteOrder(id){
  if(confirm("Supprimer ?")){
    db.collection("orders").doc(id).delete();
  }
}

function sendWhatsApp(phone,total){
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent("Total: "+total+" GNF"));
}

const client = document.getElementById("client");
const phone = document.getElementById("phone");
const service = document.getElementById("service");
const amountInput = document.getElementById("amount");

loadOrders();
</script>

</body>
</html>
