<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasyCourse GN</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
h1 { text-align:center; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.btn-add { background:#007bff; color:white; }
.order { border-bottom:1px solid #eee; padding:10px 0; }
</style>
</head>

<body>

<div class="container">
<h1>EasyCourse GN</h1>

<div class="card">
<h3>Nouvelle commande</h3>

<input id="client" placeholder="Nom client">
<input id="phone" placeholder="Téléphone">

<select id="service">
<option>Course</option>
<option>Paiement</option>
<option>Démarche</option>
<option>Colis</option>
</select>

<input id="amount" type="number" placeholder="Montant (GNF)">

<button class="btn-add" onclick="addOrder()">Ajouter</button>
</div>

<div class="card">
<h3>Commandes</h3>
<div id="orders"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBo6Iosq4_Pgdi3ZzyhzRnNkW065cAgyhY",
  authDomain: "easycourse-960bc.firebaseapp.com",
  projectId: "easycourse-960bc",
  storageBucket: "easycourse-960bc.firebasestorage.app",
  messagingSenderId: "625958136400",
  appId: "1:625958136400:web:5dcf3178977815eb52ff55"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addOrder() {
  let client = document.getElementById("client").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let amount = document.getElementById("amount").value;

  if(!client || !phone || !amount){
    alert("Remplis les champs !");
    return;
  }

  db.collection("orders").add({
    client,
    phone,
    service,
    amount,
    date: new Date()
  });
}

function loadOrders() {
  db.collection("orders").onSnapshot(snapshot => {
    let list = document.getElementById("orders");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      let o = doc.data();

      list.innerHTML += `
        <div class="order">
          <b>${o.client}</b><br>
          ${o.service} - ${o.amount} GNF
        </div>
      `;
    });
  });
}

loadOrders();
</script>

</body>
</html>
