<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasyCourse GN</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:12px; }

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:8px;
  border:none;
  border-radius:5px;
  margin-top:5px;
  cursor:pointer;
}

.green { background:#28a745; color:white; }
.red { background:#dc3545; color:white; }
.whatsapp { background:#25D366; color:white; }
.blue { background:#007bff; color:white; }
</style>
</head>

<body>

<div class="container">

<h2>EasyCourse GN</h2>

<div class="card">
<h3>Statistiques</h3>
Total gagné : <b id="total">0</b> GNF
</div>

<div class="card">
<h3>Nouvelle commande</h3>

<input id="client" placeholder="Nom client">
<input id="phone" placeholder="Téléphone">

<select id="service">
<option>Course</option>
<option>Paiement</option>
<option>Démarche</option>
<option>Colis</option>
</select>

<input id="amount" type="number" placeholder="Montant (GNF)">

<select id="distance">
<option value="proche">Proche</option>
<option value="moyen">Moyen</option>
<option value="loin">Loin</option>
</select>

<select id="urgent">
<option value="0">Normal</option>
<option value="10000">Urgent (+10 000)</option>
</select>

<button class="blue" onclick="addOrder()">Ajouter</button>
</div>

<div class="card">
<h3>Commandes</h3>
<div id="orders"></div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBo6Iosq4_Pgdi3ZzyhzRnNkW065cAgyhY",
  authDomain: "easycourse-960bc.firebaseapp.com",
  projectId: "easycourse-960bc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CALCUL
function calculate(amount, distance, urgent){
  let base = 15000;
  if(distance === "moyen") base = 20000;
  if(distance === "loin") base = 25000;

  let percent = amount * 0.03;
  let total = base + percent + Number(urgent);

  return { base, percent, total };
}

// AJOUT
function addOrder(){
  let client = clientInput.value;
  let phone = phoneInput.value;
  let service = serviceInput.value;
  let amount = Number(amountInput.value);
  let distance = distanceInput.value;
  let urgent = urgentInput.value;

  if(!client || !phone || amount <= 0){
    alert("Remplis correctement");
    return;
  }

  let calc = calculate(amount, distance, urgent);

  db.collection("orders").add({
    client, phone, service, amount,
    distance, urgent,
    base: calc.base,
    percent: calc.percent,
    total: calc.total,
    status:"En attente",
    date:new Date()
  });
}

// LOAD
function loadOrders(){
  db.collection("orders").orderBy("date","desc")
  .onSnapshot(snap=>{
    let html="";
    let totalGain=0;

    snap.forEach(doc=>{
      let o = doc.data();
      let id = doc.id;

      if(o.status==="Terminé") totalGain += o.total;

      html+=`
      <div>
      <b>${o.client}</b> (${o.phone})<br>
      ${o.service} - ${o.amount} GNF<br>

      Distance: ${o.distance}<br>
      Urgence: ${o.urgent == 0 ? "Normal" : "Urgent"}<br>

      Frais: ${o.base} GNF<br>
      Commission (3%): ${Math.round(o.percent)} GNF<br>

      <b>Total: ${Math.round(o.total)} GNF</b><br>
      Statut: ${o.status}<br>

      <button class="green" onclick="updateStatus('${id}','${o.status}')">Statut</button>
      <button class="red" onclick="deleteOrder('${id}')">Supprimer</button>
      <button class="whatsapp" onclick="sendWhatsApp('${o.phone}','${Math.round(o.total)}')">WhatsApp</button>
      <button onclick="generatePDF('${o.client}','${o.phone}','${o.service}','${o.amount}','${Math.round(o.total)}')">PDF</button>

      <hr>
      </div>`;
    });

    document.getElementById("orders").innerHTML = html;
    document.getElementById("total").innerText = Math.round(totalGain);
  });
}

// STATUT
function updateStatus(id,status){
  let next = status==="En attente"?"En cours":status==="En cours"?"Terminé":"En attente";
  db.collection("orders").doc(id).update({status:next});
}

// DELETE
function deleteOrder(id){
  if(confirm("Supprimer ?")){
    db.collection("orders").doc(id).delete();
  }
}

// WHATSAPP
function sendWhatsApp(phone,total){
  let msg = "Bonjour, total à payer : " + total + " GNF";
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

// PDF PRO
function generatePDF(client, phone, service, amount, total){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let date = new Date().toLocaleDateString();
  let num = "FAC-" + Date.now();

  doc.setFontSize(18);
  doc.text("EasyCourse GN", 20, 20);

  doc.setFontSize(12);
  doc.text("FACTURE", 150, 20);

  doc.text("N° : " + num, 20, 35);
  doc.text("Date : " + date, 20, 45);

  doc.text("Client : " + client, 20, 60);
  doc.text("Téléphone : " + phone, 20, 70);

  doc.line(20, 80, 190, 80);

  doc.text("Service", 20, 95);
  doc.text("Montant", 140, 95);

  doc.line(20, 100, 190, 100);

  doc.text(service, 20, 110);
  doc.text(amount + " GNF", 140, 110);

  doc.line(20, 120, 190, 120);

  doc.setFontSize(14);
  doc.text("TOTAL : " + total + " GNF", 20, 140);

  doc.setFontSize(10);
  doc.text("Merci pour votre confiance", 20, 170);

  doc.save("Facture_" + client + ".pdf");
}

// INPUTS
const clientInput = document.getElementById("client");
const phoneInput = document.getElementById("phone");
const serviceInput = document.getElementById("service");
const amountInput = document.getElementById("amount");
const distanceInput = document.getElementById("distance");
const urgentInput = document.getElementById("urgent");

loadOrders();
</script>

</body>
</html>
