<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasyCourse GN</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
h1 { text-align:center; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.btn-add { background:#007bff; color:white; }
.btn-status { background:#28a745; color:white; }
.btn-delete { background:#dc3545; color:white; }
.btn-whatsapp { background:#25D366; color:white; }

.order { border-bottom:1px solid #eee; padding:10px 0; }
</style>
</head>

<body>

<div class="container">
<h1>EasyCourse GN</h1>

<div class="card">
<h3>Statistiques</h3>
<p>Total gagné : <b id="total">0</b> GNF</p>
</div>

<div class="card">
<h3>Nouvelle commande</h3>

<input id="client" placeholder="Nom client">
<input id="phone" placeholder="Téléphone">

<select id="service">
<option>Course</option>
<option>Paiement</option>
<option>Démarche</option>
<option>Colis</option>
</select>

<input id="amount" type="number" placeholder="Montant (GNF)">

<button class="btn-add" onclick="addOrder()">Ajouter</button>
</div>

<div class="card">
<h3>Commandes</h3>
<div id="orders"></div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBo6Iosq4_Pgdi3ZzyhzRnNkW065cAgyhY",
  authDomain: "easycourse-960bc.firebaseapp.com",
  projectId: "easycourse-960bc",
  storageBucket: "easycourse-960bc.firebasestorage.app",
  messagingSenderId: "625958136400",
  appId: "1:625958136400:web:5dcf3178977815eb52ff55"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CALCUL
function calculate(amount){
  let base = 15000;
  let percent = amount * 0.03;
  return base + percent;
}

// AJOUT
function addOrder() {
  let client = clientInput.value;
  let phone = phoneInput.value;
  let service = serviceInput.value;
  let amount = Number(amountInput.value);

  if(!client || !phone || amount <= 0){
    alert("Remplis correctement !");
    return;
  }

  let total = calculate(amount);

  db.collection("orders").add({
    client,
    phone,
    service,
    amount,
    total,
    status: "En attente",
    date: new Date()
  });
}

// CHARGEMENT
function loadOrders() {
  db.collection("orders").orderBy("date","desc")
  .onSnapshot(snapshot => {

    let html = "";
    let totalGain = 0;

    snapshot.forEach(doc => {
      let o = doc.data();
      let id = doc.id;

      if(o.status === "Terminé"){
        totalGain += o.total;
      }

      html += `
      <div class="order">
        <b>${o.client}</b> (${o.phone})<br>
        ${o.service} - ${o.amount} GNF<br>
        Total: ${Math.round(o.total)} GNF<br>
        Statut: ${o.status}<br>

        <button class="btn-status" onclick="updateStatus('${id}','${o.status}')">Statut</button>
        <button class="btn-delete" onclick="deleteOrder('${id}')">Supprimer</button>
        <button class="btn-whatsapp" onclick="sendWhatsApp('${o.phone}','${o.total}')">WhatsApp</button>
      </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;
    document.getElementById("total").innerText = totalGain;
  });
}

// STATUT
function updateStatus(id, current){
  let next = "En cours";
  if(current === "En cours") next = "Terminé";
  if(current === "Terminé") next = "En attente";

  db.collection("orders").doc(id).update({
    status: next
  });
}

// SUPPRIMER
function deleteOrder(id){
  if(confirm("Supprimer ?")){
    db.collection("orders").doc(id).delete();
  }
}

// WHATSAPP
function sendWhatsApp(phone, total){
  let msg = "Bonjour, total à payer : " + total + " GNF";
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

// INPUTS
const clientInput = document.getElementById("client");
const phoneInput = document.getElementById("phone");
const serviceInput = document.getElementById("service");
const amountInput = document.getElementById("amount");

loadOrders();
</script>

</body>
</html>
