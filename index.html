<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasyCourse GN</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

.btn-add { background: #007bff; color: white; }
.btn-status { background: #28a745; color: white; }
.btn-whatsapp { background: #25D366; color: white; }
.btn-pdf { background: #ff9800; color: white; }

.order {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>EasyCourse GN</h1>

<div class="card">
<h3>Nouvelle commande</h3>

<input id="client" placeholder="Nom client">
<input id="phone" placeholder="Téléphone (ex: 2246...)">

<select id="service">
<option>Course</option>
<option>Paiement</option>
<option>Démarche</option>
<option>Colis</option>
</select>

<input id="amount" type="number" placeholder="Montant (GNF)">

<select id="distance">
<option value="proche">Proche</option>
<option value="moyen">Moyen</option>
<option value="loin">Loin</option>
</select>

<select id="urgent">
<option value="0">Normal</option>
<option value="10000">Urgent (+10 000)</option>
</select>

<button class="btn-add" onclick="addOrder()">Ajouter commande</button>

</div>

<div class="card">
<h3>Commandes</h3>
<div id="orders"></div>
</div>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function calculate(amount, distance, urgent) {
  let base = 15000;

  if(distance === "moyen") base = 20000;
  if(distance === "loin") base = 25000;

  let percent = amount * 0.03;
  let total = base + percent + Number(urgent);

  return { base, percent, total };
}

function addOrder() {
  let client = document.getElementById("client").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let amount = Number(document.getElementById("amount").value);
  let distance = document.getElementById("distance").value;
  let urgent = document.getElementById("urgent").value;

  if(!client || !phone || !amount){
    alert("Remplis tous les champs !");
    return;
  }

  let calc = calculate(amount, distance, urgent);

  let order = {
    client, phone, service, amount, distance,
    base: calc.base,
    percent: calc.percent,
    total: calc.total,
    status: "En attente"
  };

  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  render();
}

function render() {
  let list = document.getElementById("orders");
  list.innerHTML = "";

  orders.forEach((o, i) => {
    list.innerHTML += `
    <div class="order">
      <b>${o.client}</b> (${o.phone})<br>
      Service: ${o.service}<br>
      Montant: ${o.amount} GNF<br>

      Frais fixe: ${o.base} GNF<br>
      Commission (3%): ${Math.round(o.percent)} GNF<br>

      <b>Total: ${Math.round(o.total)} GNF</b><br>
      Statut: ${o.status}<br>

      <button class="btn-status" onclick="updateStatus(${i})">Changer statut</button>
      <button class="btn-whatsapp" onclick="sendWhatsApp(${i})">WhatsApp</button>
      <button class="btn-pdf" onclick="generatePDF(${i})">Facture</button>
    </div>
    `;
  });
}

function updateStatus(i){
  let statuses = ["En attente","En cours","Terminé"];
  let current = orders[i].status;
  let next = statuses[(statuses.indexOf(current)+1)%3];
  orders[i].status = next;
  localStorage.setItem("orders", JSON.stringify(orders));
  render();
}

function sendWhatsApp(i){
  let o = orders[i];

  let message = `Bonjour ${o.client},

Votre commande EasyCourse GN :

Service: ${o.service}
Montant: ${o.amount} GNF

Frais: ${o.base} GNF
Commission (3%): ${Math.round(o.percent)} GNF

Total: ${Math.round(o.total)} GNF

Merci pour votre confiance.`;

  let url = "https://wa.me/" + o.phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

function generatePDF(i){
  let o = orders[i];

  let content = `
EASYCOURSE GN

Client: ${o.client}
Téléphone: ${o.phone}

Service: ${o.service}
Montant: ${o.amount} GNF

Frais: ${o.base} GNF
Commission: ${Math.round(o.percent)} GNF

TOTAL: ${Math.round(o.total)} GNF

Merci pour votre confiance.
`;

  let blob = new Blob([content], { type: "text/plain" });
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "facture_easycourse.txt";
  link.click();
}

render();

</script>

</body>
</html>
